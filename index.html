<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>💰 Expense Tracker</h1>

      <!-- Balance -->
      <div class="balance-box">
        <h2>Balance</h2>
        <h3 id="balance">Rs 0</h3>
      </div>

      <!-- Income / Expense -->
      <div class="summary">
        <div class="income">
          <p>Income</p>
          <h4 id="income">Rs 0</h4>
        </div>
        <div class="expense">
          <p>Expense</p>
          <h4 id="expense">Rs 0</h4>
        </div>
      </div>

      <!-- Form -->
      <div class="form">
        <input type="text" id="text" placeholder="Description" />
        <input type="number" id="amount" placeholder="Amount" />

        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>

        <button id="addBtn">Add Transaction</button>
      </div>

      <!-- Filter -->
      <div class="filter">
        <button data-filter="all">All</button>
        <button data-filter="income">Income</button>
        <button data-filter="expense">Expense</button>
      </div>

      <!-- List -->
      <ul id="list"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
